<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#005288">
  <title>TechDoku – S. Fritz</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="css/styles.css">
  <script src="vendor/jspdf.umd.min.js"></script>
  <script src="vendor/html2canvas.min.js"></script>
</head>
<body>

  <header class="app-header">
    <span class="logo">🛠️</span>
    <h1>Technische Dokumentation<small>S. Fritz · TechDoku 2026</small></h1>
    <button class="icon-btn" id="themeToggle" title="Hell/Dunkel">🌙</button>
  </header>

  <main>
    <!-- ============ FORMULAR ============ -->
    <section class="view active" id="formView">
      <div class="error-box hidden" id="errorBox"></div>

      <div class="card">
        <div class="card-title"><span class="num">1</span> Auftrag</div>
        <div class="field">
          <label>Auftragstyp <span class="req">*</span></label>
          <div class="seg">
            <input type="radio" name="auftragstyp" id="typRekl" value="Reklamation">
            <label for="typRekl">⚠️ Reklamation</label>
            <input type="radio" name="auftragstyp" id="typFert" value="Fertigungsauftrag">
            <label for="typFert">🏭 Fertigungsauftrag</label>
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label>Kunde (Firma) <span class="req">*</span></label>
            <input id="kunde" list="sg_kunde" placeholder="z.B. Mustermann GmbH">
            <datalist id="sg_kunde"></datalist>
          </div>
          <div class="field">
            <label>Maschine <span class="req">*</span></label>
            <input id="maschine" list="sg_maschine">
            <datalist id="sg_maschine"></datalist>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><span class="num">2</span> Teil &amp; Details</div>
        <div class="grid-2">
          <div class="field">
            <label>AB-Nr. <span class="req">*</span></label>
            <input id="abnr" inputmode="numeric">
          </div>
          <div class="field">
            <label>Zeichnungsnr. <span class="req">*</span></label>
            <input id="zeichnungsnummer">
          </div>
          <div class="field">
            <label>Index <span class="req">*</span></label>
            <input id="index">
          </div>
          <div class="field">
            <label>Verantwortlich <span class="req">*</span></label>
            <input id="verantwortlich" list="sg_verantwortlich">
            <datalist id="sg_verantwortlich"></datalist>
          </div>
          <div class="field">
            <label>Datum <span class="req">*</span></label>
            <input type="date" id="datum">
          </div>
          <div class="field">
            <label>Stückzahl <span class="req">*</span></label>
            <input type="number" id="stueckzahl" min="1" step="1" inputmode="numeric">
          </div>
          <div class="field" style="grid-column:1/-1">
            <label>Benennung der Teile <span class="req">*</span></label>
            <input id="teilebenennung" list="sg_teilebenennung">
            <datalist id="sg_teilebenennung"></datalist>
          </div>
          <div class="field hidden" id="versionField">
            <label>Version <span class="req">*</span></label>
            <input id="version">
          </div>
          <div class="field hidden" id="spanndruckField">
            <label>Spanndruck <span class="req">*</span></label>
            <input id="spanndruck">
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><span class="num">3</span> Bemerkungen</div>
        <div class="field">
          <label>Bemerkungen <span class="req">*</span></label>
          <div class="input-with-btn">
            <textarea id="bemerkung" rows="3" placeholder="Beschreibung / Mangel / Hinweise…"></textarea>
            <button class="mic-btn" id="micBtn" title="Diktieren">🎤</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><span class="num">4</span> Fotos</div>
        <div class="photo-add" id="photoAdd">
          <span class="big">📷</span>
          <strong>Fotos hinzufügen</strong><br>
          <small>Kamera oder Galerie · max. 9</small>
        </div>
        <input type="file" id="photoInput" accept="image/*" multiple capture="environment" class="hidden">
        <div class="photo-grid" id="photoGrid"></div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="btnPdf">📄 PDF erstellen</button>
        <button class="btn btn-share" id="btnShare">📤 Teilen (WhatsApp)</button>
      </div>
      <div style="height:10px"></div>
      <button class="btn btn-ghost" id="btnNew">✨ Neues Formular / Leeren</button>
    </section>
  </main>

  <!-- ============ Foto-Editor ============ -->
  <div class="modal" id="annoModal">
    <div class="modal-head">
      <button id="annoCancel">✕</button>
      <h2>Foto markieren</h2>
      <button id="annoSave" style="background:#16a34a">✓ Fertig</button>
    </div>
    <div class="canvas-wrap"><canvas id="annoCanvas"></canvas></div>
    <div class="tool-bar">
      <button class="tool active" data-tool="arrow" title="Pfeil">↗</button>
      <button class="tool" data-tool="ellipse" title="Kreis">◯</button>
      <button class="tool" data-tool="pen" title="Stift">✎</button>
      <span style="width:1px;background:#334155;align-self:stretch;margin:0 2px"></span>
      <div id="annoColors" style="display:flex;gap:6px;align-items:center"></div>
      <span style="width:1px;background:#334155;align-self:stretch;margin:0 2px"></span>
      <button class="tool" id="annoUndo" title="Rückgängig">↶</button>
      <button class="tool" id="annoClear" title="Alles löschen">🗑</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="loading" id="loading"><div class="spinner"></div><span id="loadingText">PDF wird erstellt…</span></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
